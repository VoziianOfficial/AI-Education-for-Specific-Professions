<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title">
  <title id="title">Rolewise AI favicon</title>

  <defs>
    <linearGradient id="borderGradient" x1="72" y1="64" x2="438" y2="454" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7567FF"/>
